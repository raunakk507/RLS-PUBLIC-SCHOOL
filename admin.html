<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDMS Admin Portal | Management Desk</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #ffffff;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #1e293b; 
            overflow-x: hidden; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.06) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(14, 165, 233, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        /* Soft, glowing ambient blobs for a futuristic light theme */
        .ambient-blob-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            animation: pulseBlob 12s infinite alternate ease-in-out;
        }
        .ambient-blob-2 {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            animation: pulseBlob 16s infinite alternate ease-in-out;
        }
        
        @keyframes pulseBlob {
            0% { transform: scale(1) translate(0px, 0px); opacity: 0.8; }
            100% { transform: scale(1.15) translate(30px, -30px); opacity: 1; }
        }

        /* Light claymorphic cards */
        .clay-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            box-shadow: 
                0 20px 40px rgba(15, 23, 42, 0.04),
                inset -4px -4px 12px rgba(255, 255, 255, 0.8),
                inset 4px 4px 8px rgba(0, 0, 0, 0.01);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .clay-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(14, 165, 233, 0.3);
            box-shadow: 
                0 30px 50px rgba(14, 165, 233, 0.08),
                inset -4px -4px 12px rgba(255, 255, 255, 0.9),
                inset 4px 4px 8px rgba(14, 165, 233, 0.02);
        }
        
        .active-tab-glow {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.15) 0%, rgba(99, 102, 241, 0.15) 100%) !important;
            box-shadow: 
                0 15px 30px rgba(14, 165, 233, 0.12),
                inset 0 1px 2px rgba(255, 255, 255, 0.4) !important;
        }

        /* Dynamic Theme Palette Override Rules */
        .theme-sky {
            --primary: #0ea5e9;
            --box-tint: rgba(14, 165, 233, 0.05);
            --box-border: rgba(14, 165, 233, 0.12);
        }

        /* Force dark text for high legibility inside light theme */
        h1, h2, h3, h4, h5, h6,
        .text-white, .text-slate-100, .text-slate-200, .text-slate-300 {
            color: #1e293b !important;
        }
        .text-slate-400, .text-slate-500, .text-slate-350, .text-slate-300 {
            color: #475569 !important;
        }
        
        /* Standard card sub-containers & inputs */
        .bg-slate-900, .bg-slate-950, .bg-slate-900\/60, .bg-slate-950\/80, .bg-slate-900\/30, .bg-slate-900\/40, .bg-slate-950\/40 {
            background-color: var(--box-tint) !important;
            border: 1px solid var(--box-border) !important;
            color: #1e293b !important;
        }
        
        input, select, textarea {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #1e293b !important;
        }
        input::placeholder, select::placeholder {
            color: #94a3b8 !important;
        }

        button.bg-slate-800, button.bg-slate-950 {
            background-color: #0f172a !important;
            color: #ffffff !important;
        }
        
        .border-slate-800, .border-slate-850, .border-slate-900 {
            border-color: var(--box-border) !important;
        }

        .bg-rose-500\/10, .bg-rose-500\/20 { background-color: rgba(244, 63, 94, 0.08) !important; }
        .bg-emerald-500\/10, .bg-emerald-500\/20 { background-color: rgba(16, 185, 129, 0.08) !important; }
        .bg-sky-500\/10, .bg-sky-500\/20 { background-color: rgba(14, 165, 233, 0.08) !important; }
        .bg-blue-500\/10, .bg-blue-500\/20 { background-color: rgba(59, 130, 246, 0.08) !important; }
        .bg-purple-500\/10, .bg-purple-500\/20 { background-color: rgba(168, 85, 247, 0.08) !important; }
        .bg-amber-500\/10, .bg-amber-500\/20 { background-color: rgba(245, 158, 11, 0.08) !important; }

        .glass-dark {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            color: #1e293b !important;
        }
        
        .gradient-text { 
            background: linear-gradient(135deg, #0284c7 0%, #7c3aed 50%, #db2777 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        @keyframes fadeInUpTab {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .fade-in-up-tab {
            animation: fadeInUpTab 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .fade-down { animation: fadeInUpTab 0.5s ease-out reverse forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(241, 245, 249, 0.6); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Uiverse logout button adaptation */
        .Btn {
          display: flex;
          align-items: center;
          justify-content: flex-start;
          width: 45px;
          height: 45px;
          border: none;
          border-radius: 50%;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition-duration: .3s;
          box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.05);
          background-color: rgb(239, 68, 68);
        }
        .sign {
          width: 100%;
          transition-duration: .3s;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .text {
          position: absolute;
          right: 0%;
          width: 0%;
          opacity: 0;
          color: white;
          font-size: 10px;
          font-weight: 800;
          transition-duration: .3s;
          white-space: nowrap;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }
        .Btn:hover {
          width: 120px;
          border-radius: 40px;
          transition-duration: .3s;
        }
        .Btn:hover .sign {
          width: 35%;
          transition-duration: .3s;
          padding-left: 12px;
        }
        .Btn:hover .text {
          opacity: 1;
          width: 65%;
          transition-duration: .3s;
          padding-right: 15px;
        }
        .Btn:active {
          transform: translate(2px ,2px);
        }

        @media (max-width: 767px) {
            .clay-card {
                padding: 1rem !important;
                border-radius: 1.25rem !important;
            }
            body {
                padding-bottom: 7.5rem !important;
            }
            h1, h2, h3 {
                font-size: 1.2rem !important;
            }
            .max-w-7xl {
                padding-left: 0.25rem !important;
                padding-right: 0.25rem !important;
            }
            /* Dynamic Tailwind class compression on mobile */
            .text-xs { font-size: 0.7rem !important; }
            .text-sm { font-size: 0.75rem !important; }
            .text-base { font-size: 0.85rem !important; }
            .text-lg { font-size: 0.95rem !important; }
            .text-xl { font-size: 1.1rem !important; }
            .text-2xl { font-size: 1.25rem !important; }
            .text-3xl { font-size: 1.4rem !important; }
            
            .p-4 { padding: 0.75rem !important; }
            .p-6 { padding: 1rem !important; }
            .p-8 { padding: 1.25rem !important; }
            
            .gap-4 { gap: 0.75rem !important; }
            .gap-6 { gap: 1rem !important; }
            
            /* Compact list layout controls */
            .flex-col-mobile {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 0.5rem !important;
            }
            .hidden-mobile {
                display: none !important;
            }

            /* Responsive table behavior for Admin Portal Student Fee Status */
            table, thead, tbody, th, td, tr {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            thead tr {
                position: absolute !important;
                top: -9999px !important;
                left: -9999px !important;
                display: none !important;
            }
            
            tr {
                border: 1px solid rgba(14, 165, 233, 0.12) !important;
                background: rgba(14, 165, 233, 0.03) !important;
                border-radius: 1.25rem !important;
                padding: 0.85rem !important;
                margin-bottom: 1.25rem !important;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.01) !important;
            }
            
            td {
                border: none !important;
                position: relative !important;
                padding: 0.5rem 0 !important;
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                text-align: right !important;
                border-bottom: 1px dashed rgba(14, 165, 233, 0.08) !important;
            }
            
            td:last-child {
                border-bottom: none !important;
                padding-bottom: 0 !important;
            }
            
            td:first-child {
                border-bottom: 1.5px solid rgba(14, 165, 233, 0.15) !important;
                padding-top: 0 !important;
                padding-bottom: 0.75rem !important;
                margin-bottom: 0.25rem !important;
                justify-content: flex-start !important;
                text-align: left !important;
            }
            
            /* Inject labels dynamically for the columns */
            td:nth-of-type(2)::before { content: "Class:"; font-weight: 850; color: #475569; text-transform: uppercase; font-size: 0.7rem; float: left; text-align: left; }
            td:nth-of-type(3)::before { content: "Due Amount:"; font-weight: 850; color: #475569; text-transform: uppercase; font-size: 0.7rem; float: left; text-align: left; }
            td:nth-of-type(4)::before { content: "Status:"; font-weight: 850; color: #475569; text-transform: uppercase; font-size: 0.7rem; float: left; text-align: left; }
            td:nth-of-type(5)::before { content: "Dept Invoice:"; font-weight: 850; color: #475569; text-transform: uppercase; font-size: 0.7rem; float: left; text-align: left; }
            td:nth-of-type(6)::before { content: "Actions:"; font-weight: 850; color: #475569; text-transform: uppercase; font-size: 0.7rem; float: left; text-align: left; }
            
            /* Compact active row lists, buttons and alignments */
            td .flex {
                justify-content: flex-end !important;
                width: auto !important;
                gap: 0.25rem !important;
            }
            td button {
                padding: 0.3rem 0.5rem !important;
                font-size: 0.65rem !important;
                border-radius: 0.5rem !important;
            }
        }
    </style>
</head>
<body class="min-h-screen pb-12 relative">
    <div class="ambient-blob-1"></div>
    <div class="ambient-blob-2"></div>
    <div id="root"></div>

    <!-- SheetJS for Excel Uploads -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, setDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUuUCykR9GUsfC7-MiMyHqoO2OTzoax8s",
            authDomain: "b-d-modern-school-5c692.firebaseapp.com",
            projectId: "b-d-modern-school-5c692",
            storageBucket: "b-d-modern-school-5c692.firebasestorage.app",
            messagingSenderId: "319437900160",
            appId: "1:319437900160:web:739f988050091cdd5d5965",
            measurementId: "G-TRXEYPH4YT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Expose to window so our existing React code can access them
        window.firebaseDB = db;
        window.firebaseStorage = storage;
        window.fs_ref = ref;
        window.fs_uploadBytes = uploadBytes;
        window.fs_getDownloadURL = getDownloadURL;
        window.fs_collection = collection;
        window.fs_getDocs = getDocs;
        window.fs_setDoc = setDoc;
        window.fs_doc = doc;
        window.fs_onSnapshot = onSnapshot;
        console.log("Firebase initialized securely with Storage.");
    </script>

    <script>
        // One-time Reset of Local Storage Admissions Database to Clear Legacy Bloated/Wiped Records
        if (!localStorage.getItem('bdms_db_reset_2026_05_20')) {
            localStorage.removeItem('bdms_admissions_db');
            localStorage.setItem('bdms_db_reset_2026_05_20', 'true');
            console.log('Database reset to clean state successfully.');
        }

        const e = React.createElement, { useState, useEffect } = React;

        // Custom Dynamic Icon component matching primary app
        const Icon = ({ n, cls, size = 18 }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (containerRef.current && typeof lucide !== 'undefined') {
                    containerRef.current.innerHTML = `<i data-lucide="${n}" style="width: ${size}px; height: ${size}px; display: inline-flex;"></i>`;
                    lucide.createIcons({
                        targets: [containerRef.current.firstChild]
                    });
                }
            }, [n, size]);
            return e('span', { 
                key: n + size, 
                ref: containerRef, 
                className: 'inline-flex items-center justify-center ' + (cls || '') 
            });
        };

        const useWindowSize = () => {
            const [width, setWidth] = useState(window.innerWidth);
            useEffect(() => {
                const handleResize = () => setWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            return width;
        };

        // Admission Slip Preview Modal Component
        const openBase64Document = (dataUrl, filename = 'document') => {
            if (!dataUrl) return;
            if (!dataUrl.startsWith('data:')) {
                const fullUrl = dataUrl.startsWith('/') || dataUrl.startsWith('http') ? dataUrl : `/uploads/${dataUrl}`;
                window.open(fullUrl, '_blank');
                return;
            }
            try {
                const arr = dataUrl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                const blob = new Blob([u8arr], { type: mime });
                const fileUrl = URL.createObjectURL(blob);
                
                const newWin = window.open();
                if (newWin) {
                    newWin.document.write(`
                        <html>
                            <head>
                                <title>${filename}</title>
                                <style>
                                    body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0f172a; height: 100vh; font-family: system-ui, -apple-system, sans-serif; color: #f8fafc; }
                                    .container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; position: relative; }
                                    iframe { width: 100%; height: calc(100vh - 60px); border: none; }
                                    img { max-width: 90%; max-height: 85%; object-fit: contain; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
                                    .header-bar { display: flex; width: 100%; height: 60px; background: #1e293b; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; border-bottom: 1px solid #334155; }
                                    .btn { background: #0ea5e9; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; transition: all 0.2s; }
                                    .btn:hover { background: #0284c7; transform: translateY(-1px); }
                                    .title { font-size: 14px; font-weight: 800; color: #f1f5f9; }
                                </style>
                            </head>
                            <body>
                                <div class="container">
                                    <div class="header-bar">
                                        <span class="title">${filename}</span>
                                        <a href="${fileUrl}" download="${filename}" class="btn">Download Document</a>
                                    </div>
                                    ${mime.includes('pdf') 
                                        ? `<iframe src="${fileUrl}"></iframe>` 
                                        : `<div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%;"><img src="${fileUrl}" alt="${filename}" /></div>`
                                    }
                                </div>
                            </body>
                        </html>
                    `);
                    newWin.document.close();
                } else {
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } catch (e) {
                console.error('Error opening document:', e);
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        // Admission Slip Preview Modal Component
        const SlipPreviewModal = ({ preview, onClose }) => {
            const docs = preview.docs || {};
            const photoData = docs.studentPhoto?.data || null;
            const birthCertData = docs.birthCert?.data || null;
            const parentIDData = docs.parentID?.data || null;

            return e('div', { className: 'fixed inset-0 bg-slate-950/70 backdrop-blur-md z-[999999] flex items-center justify-center p-4' }, [
                e('div', { className: 'bg-white max-w-2xl w-full rounded-[2rem] border border-slate-100 shadow-[0_30px_70px_rgba(15,23,42,0.15)] relative overflow-hidden flex flex-col h-[85vh] animate-fade-in' }, [
                    // Header
                    e('div', { className: 'p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50' }, [
                        e('div', { className: 'flex items-center gap-3' }, [
                            e('div', { className: 'w-8 h-8 rounded-xl bg-sky-50 text-sky-500 flex items-center justify-center shadow-inner' }, e(Icon, { n: 'file-text', size: 16 })),
                            e('div', { className: 'text-left' }, [
                                e('h3', { className: 'text-xs font-black text-slate-800' }, 'Admission Slip Preview'),
                                e('p', { className: 'text-[9px] text-slate-400 font-bold mt-0.5' }, `Candidate ID: ${preview.regNo}`)
                            ])
                        ]),
                        e('button', { 
                            onClick: onClose,
                            className: 'text-slate-400 hover:text-slate-600 transition-colors p-2 rounded-full hover:bg-slate-105 hover:bg-slate-100 active:scale-95' 
                        }, e(Icon, { n: 'x', size: 18 }))
                    ]),

                    // Scrollable Page Image Previews
                    e('div', { className: 'flex-1 overflow-y-auto p-6 bg-slate-100 flex flex-col gap-6 items-center' }, [
                        e('div', { className: 'w-full max-w-lg bg-white p-3 rounded-2xl shadow-sm border border-slate-200/50 relative' }, [
                            e('p', { className: 'text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center' }, 'Page 1: Student & Parent Details'),
                            e('div', { className: 'relative w-full rounded-lg overflow-hidden' }, [
                                e('img', { src: preview.page1Url, className: 'w-full rounded-lg border border-slate-100 shadow-inner' }),
                                photoData && e('button', {
                                    onClick: () => openBase64Document(photoData, docs.studentPhoto?.name || 'student_photo.jpg'),
                                    title: 'Click to open Student Photo',
                                    style: {
                                        position: 'absolute',
                                        left: '70%',
                                        top: '32.5%',
                                        width: '17.5%',
                                        height: '13.33%',
                                    },
                                    className: 'cursor-pointer border-2 border-transparent hover:border-sky-500 hover:bg-sky-500/10 transition-all rounded-lg flex items-center justify-center group'
                                }, [
                                    e('div', { className: 'opacity-0 group-hover:opacity-100 bg-slate-900/90 text-white text-[8px] font-bold px-2 py-1 rounded backdrop-blur-sm transition-opacity shadow-md pointer-events-none' }, 'Open Photo')
                                ])
                            ])
                        ]),
                        e('div', { className: 'w-full max-w-lg bg-white p-3 rounded-2xl shadow-sm border border-slate-200/50 relative' }, [
                            e('p', { className: 'text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center' }, 'Page 2: Verified Uploaded Documents'),
                            e('div', { className: 'relative w-full rounded-lg overflow-hidden' }, [
                                e('img', { src: preview.page2Url, className: 'w-full rounded-lg border border-slate-100 shadow-inner' }),
                                birthCertData && e('button', {
                                    onClick: () => openBase64Document(birthCertData, docs.birthCert?.name || 'student_aadhaar.pdf'),
                                    title: 'Click to open Student Aadhaar Card',
                                    style: {
                                        position: 'absolute',
                                        left: '8.75%',
                                        top: '21.67%',
                                        width: '37.5%',
                                        height: '35.0%',
                                    },
                                    className: 'cursor-pointer border-2 border-transparent hover:border-sky-500 hover:bg-sky-500/10 transition-all rounded-xl flex items-center justify-center group'
                                }, [
                                    e('div', { className: 'opacity-0 group-hover:opacity-100 bg-slate-900/90 text-white text-[8px] font-bold px-2 py-1 rounded backdrop-blur-sm transition-opacity shadow-md pointer-events-none' }, 'Open Aadhaar')
                                ]),
                                parentIDData && e('button', {
                                    onClick: () => openBase64Document(parentIDData, docs.parentID?.name || 'parent_id.jpg'),
                                    title: 'Click to open Parent ID Card',
                                    style: {
                                        position: 'absolute',

        const downloadAdmissionSlip = (student, parent, docs, isPreview = false) => {
            const loadImage = (src) => {
                return new Promise((resolve) => {
                    if (!src) return resolve(null);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = src;
                });
            };

            const photoData = docs?.studentPhoto?.data || null;
            const birthCertData = docs?.birthCert?.data || null;
            const parentIDData = docs?.parentID?.data || null;

            Promise.all([
                loadImage(photoData),
                loadImage(birthCertData),
                loadImage(parentIDData),
                loadImage(typeof OFFICIAL_LOGO_BASE64 !== 'undefined' ? OFFICIAL_LOGO_BASE64 : null)
            ]).then(([photoImg, birthCertImg, parentIDImg, logoImg]) => {
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 2400; // Two pages: 1200 + 1200
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';

                // ==========================================
                // PAGE 1: STUDENT & PARENT DETAILS (0 - 1200)
                // ==========================================

                // 1. Draw Page 1 Background
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, 800, 1200);

                // 2. Draw Top Header Banner
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 800, 180);

                // 3. Draw Branding Header Text & Logo
                if (logoImg) {
                    ctx.drawImage(logoImg, 375, 12, 50, 50);
                }
                
                ctx.fillStyle = '#0f172a';
                ctx.font = '900 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('B.D. MODERN SCHOOL', 400, 72);

                ctx.fillStyle = '#0284c7';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText('MOPTI, BHOJPUR, BIHAR · ENGLISH MEDIUM CO-ED', 400, 112);

                ctx.fillStyle = '#64748b';
                ctx.font = '500 12px sans-serif';
                ctx.fillText('Estd. 2018 · Affiliated to CBSE Pattern', 400, 140);



                // 4. White Card Body Container
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.05)';

                if (!window.firebaseDB) return alert("Firebase not initialized.");
                if (studentsToUpload.length === 0) return alert("No valid student data found. Ensure you have an 'ID' column.");

                setSyncing(true);
                try {
                    const colRef = window.fs_collection(window.firebaseDB, 'students');
                    
                    const uploadPromises = studentsToUpload.map(student => {
                        const docRef = window.fs_doc(colRef, student.id);
                        return window.fs_setDoc(docRef, student, { merge: true });
                    });
                    
                    await Promise.all(uploadPromises);

                    setPasteData('');

                } catch (error) {
                    console.error("Firebase upload error: ", error);
                    alert("Upload failed: " + error.message);
                    setSyncing(false);
                }
            };

            const processJSON = (jsonData) => {
                if(jsonData.length === 0) return alert("File appears empty or unreadable.");
                
                const rawHeaders = Object.keys(jsonData[0]);
                const headerMap = {};
                rawHeaders.forEach(h => {
                    const low = h.trim().toLowerCase();
                    if(low === 'fathername' || low === 'father name') headerMap[h] = 'fname';
                    else if(low === 'photourl' || low === 'photo url') headerMap[h] = 'photo';
                    else headerMap[h] = low;
                });

                const studentsToUpload = [];
                jsonData.forEach(row => {
                    const student = {};
                    for(let rawKey in row) {
                        const cleanKey = headerMap[rawKey];
                        if(cleanKey) student[cleanKey] = row[rawKey] ? String(row[rawKey]).trim() : '';
                    }
                    if(student.id) {
                        student.status = student.status || 'Active';
                        student.fees = student.fees || '0';
                        studentsToUpload.push(student);
                    }
                });
                
                uploadToFirebase(studentsToUpload);

                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        processJSON(jsonData);
                    } catch(err) {
                        alert("Error reading file. Make sure it is a valid .xlsx or .csv file.");

                            e('div', { className: `w-10 h-10 ${s.c} rounded-xl flex items-center justify-center mb-4` }, e(Icon, { n: s.i, size: 16 })),
                            e('p', { className: 'text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1' }, s.l),
                            e('p', { className: 'text-sm font-black text-slate-200 leading-none' }, s.v)
                        ))
                    ),
                    
                    e('div', { key: activeTab, className: 'fade-in-up-tab mb-8 md:mb-12' },
                        activeTab === 'Admin' ? e(AdminSessionManager) :
                        activeTab === 'Data' ? e(StudentDatabaseManager) :
                        activeTab === 'Staff' ? e(StaffManager) :
                        activeTab === 'Fees' ? e(FeeManager) :
                        activeTab === 'Admissions' ? e(AdmissionManager) : null
                    ),

                    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12 border-t border-slate-800 pt-8 md:pt-12' },
                        e('div', null,
                            e('h3', { className: 'text-base md:text-xl font-black mb-4 md:mb-6 flex items-center gap-2 text-slate-100' }, [e(Icon, { n: 'megaphone', size: 18, cls: 'text-sky-400' }), 'Post Notice']),
                            e('div', { className: 'clay-card p-4 md:p-8 rounded-2xl border border-slate-800 mb-6' }, e(NoticePublisher))
                        ),
                        e('div', null,
                            e('h3', { className: 'text-base md:text-xl font-black mb-4 md:mb-6 flex items-center gap-2 text-slate-100' }, [e(Icon, { n: 'list', size: 18, cls: 'text-sky-400' }), 'Notices']),
                            e(NoticeList)
                        )
                    )
                ]),

                // FLOATING BOTTOM DOCK FOR MOBILE PORTAL!
                e('div', { key: 'mobile-dock', className: 'fixed bottom-4 left-4 right-4 bg-white/80 backdrop-blur-2xl border border-slate-200/60 p-2 rounded-3xl shadow-xl flex items-center justify-around z-50 md:hidden transition-all duration-300' },
                    [
                        { l: 'Admin', i: 'user-plus', label: 'Admin' },
                        { l: 'Staff', i: 'users', label: 'Staff' },
                        { l: 'Fees', i: 'banknote', label: 'Fees' },
                        { l: 'Data', i: 'file-text', label: 'Data' },
                        { l: 'Admissions', i: 'graduation-cap', label: 'Enroll' }
                    ].map(s => e('button', {
                        key: s.l,
                        onClick: () => setActiveTab(s.l),
                        className: `flex flex-col items-center justify-center p-1.5 rounded-2xl transition-all relative ${activeTab === s.l ? 'text-sky-500 scale-105' : 'text-slate-400'}`
                      }, [
                        e('div', { className: `w-9 h-9 rounded-full flex items-center justify-center transition-all ${activeTab === s.l ? 'bg-sky-500/10 text-sky-500 font-black' : 'bg-transparent'}` }, e(Icon, { n: s.i, size: 16 })),
                        e('span', { className: `text-[8px] mt-0.5 font-bold tracking-tight ${activeTab === s.l ? 'text-sky-600' : 'text-slate-400'}` }, s.label)
                    ]))
                ),

                // FLOATING CHAT BUTTON
                e('button', {
                    key: 'chat-btn',
                    onClick: () => setIsAdminChatOpen(prev => !prev),
                    className: 'fixed bottom-24 right-4 md:bottom-8 md:right-8 w-12 h-12 md:w-14 md:h-14 bg-sky-50 text-sky-500 rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-105 active:scale-95 z-[60] group cursor-pointer border border-sky-200'
                }, [
                    e(Icon, { n: 'message-square', size: 22, cls: 'group-hover:animate-pulse' }),
                    e('span', { className: 'absolute top-0 right-0 flex h-3.5 w-3.5' }, [
                        e('span', { className: 'animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75' }),
                        e('span', { className: 'relative inline-flex rounded-full h-3.5 w-3.5 bg-red-500 border-2 border-white' })
                    ])
                ]),

                e(AdminChatManager, { key: 'admin-chat-widget', isOpen: isAdminChatOpen, onClose: () => setIsAdminChatOpen(false) }),

                // Admission Slip Preview Modal
                activeSlipPreview && e(SlipPreviewModal, { 
                    preview: activeSlipPreview, 
                    onClose: () => setActiveSlipPreview(null) 
                }),

                // Loader overlay for slip generation
                isGeneratingSlip && e('div', { className: 'fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[9999999] flex flex-col items-center justify-center text-white' }, [
                    e('div', { className: 'w-16 h-16 bg-white/10 rounded-2xl border border-white/20 flex items-center justify-center mb-4' }, 
                        e(Icon, { n: 'loader-2', size: 32, cls: 'animate-spin text-sky-400' })
                    ),
                    e('h3', { className: 'text-sm font-black tracking-wider uppercase text-slate-100 mt-2' }, 'Generating Admission Slip'),
                    e('p', { className: 'text-[10px] text-slate-400 font-bold uppercase mt-1.5' }, 'Rendering high resolution pages...')
                ])
            ]);
        };
        // Cleanup bloated legacy data URLs to prevent QuotaExceededError
        try {
            const rawDb = localStorage.getItem('bdms_admissions_db');
            if (rawDb) {
                const db = JSON.parse(rawDb);
                let migrated = false;
                const cleaned = db.map(adm => {
                    let recordMigrated = false;
                    const cleanDocs = { ...adm.docs };
                    if (cleanDocs.birthCert && cleanDocs.birthCert.data && cleanDocs.birthCert.data.length > 2000000) {
                        cleanDocs.birthCert = { ...cleanDocs.birthCert, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.parentID && cleanDocs.parentID.data && cleanDocs.parentID.data.length > 2000000) {
                        cleanDocs.parentID = { ...cleanDocs.parentID, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.studentPhoto && cleanDocs.studentPhoto.data && cleanDocs.studentPhoto.data.length > 2000000) {
                        cleanDocs.studentPhoto = { ...cleanDocs.studentPhoto, data: '' };
                        recordMigrated = true;
                    }
                    if (recordMigrated) migrated = true;
                    return { ...adm, docs: cleanDocs };
                });
                if (migrated) {
                    localStorage.setItem('bdms_admissions_db', JSON.stringify(cleaned));
                    console.log('Sanitized local admissions database: cleared heavy file uploads.');
                }
            }
        } catch (e) {
            console.error('Failed to run admissions database migration:', e);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(e(DepartmentPortal));
    </script>
</body>
</html>
