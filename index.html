    <!-- Capture PWA install prompt instantly before React mounts to avoid race conditions -->

        window.deferredPWAInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPWAInstallPrompt = e;
        });

    <style>
        :root {
            --primary: #0B5CFF;
            --primary-light: #2D8CFF;
            --bg: #f8fafc;
            --clay-shadow: 20px 20px 60px rgba(11, 92, 255, 0.05), -20px -20px 60px #ffffff;
            --clay-shadow-sm: 10px 10px 30px rgba(11, 92, 255, 0.03), -10px -10px 30px #ffffff;
            --clay-inset: inset 6px 6px 12px rgba(11, 92, 255, 0.08), inset -6px -6px 12px #ffffff;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; }
        .clay-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
            box-shadow: 
                20px 20px 40px rgba(0, 0, 0, 0.05),
                inset -5px -5px 15px rgba(255, 255, 255, 0.5),
                inset 5px 5px 10px rgba(0, 0, 0, 0.02);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 25px 25px 50px rgba(0, 0, 0, 0.08);
            border-color: rgba(14, 165, 233, 0.3);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
        }
        .animate-border {
            position: relative;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(to right, #0ea5e9, #2dd4bf) border-box;
            border: 2px solid transparent;
        }
        .glow-sky { filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.3)); }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 200px;
            gap: 1.5rem;
        }
        @keyframes float-particle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle linear infinite;
        }
        .clay-btn { background: #f8fafc; box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff; transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.5); }
        .clay-btn:active { box-shadow: var(--clay-inset); transform: scale(0.98); }
        .glass-nav { background: rgba(248, 250, 252, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #0ea5e9 0%, #2dd4bf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatSlow { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .float { animation: float 6s ease-in-out infinite; }
        .float-slow { animation: floatSlow 8s ease-in-out infinite; }
        .fade-up { animation: fadeInUp 0.8s ease-out forwards; }
        .fade-up-1 { animation: fadeInUp 0.8s 0.1s ease-out both; }
        .fade-up-2 { animation: fadeInUp 0.8s 0.25s ease-out both; }
        .fade-up-3 { animation: fadeInUp 0.8s 0.4s ease-out both; }
        .fade-up-4 { animation: fadeInUp 0.8s 0.55s ease-out both; }
        .glass-card { background: rgba(255,255,255,0.12); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.25); border-radius: 2rem; }
        .shimmer-text { background: linear-gradient(90deg, #fff 0%, #7dd3fc 40%, #fff 60%, #7dd3fc 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }

        /* From Uiverse.io by Creatlydev */ 
        .button {
          text-decoration: none;
          line-height: 1;
          border-radius: 1.5rem;
          overflow: hidden;
          position: relative;
          box-shadow: 10px 10px 20px rgba(0,0,0,.05);
          background-color: #fff;
          color: #121212;
          border: none;
          cursor: pointer;
        }

        .button-decor {
          position: absolute;
          inset: 0;
          background-color: var(--clr);
          transform: translateX(-100%);
          transition: transform .3s;
          z-index: 0;
        }

        .button-content {
          display: flex;
          align-items: center;
          font-weight: 600;
          position: relative;
          overflow: hidden;
          width: 100%;
        }

        .button__icon {
          width: 48px;
          height: 40px;
          background-color: var(--clr);
          display: grid;
          place-items: center;
          color: #fff;
        }

        .button__text {
          display: inline-block;
          transition: color .2s;
          padding: 2px 1.5rem 2px;
          padding-left: .75rem;
          overflow: hidden;
          white-space: nowrap;
          text-overflow: ellipsis;
          max-width: 100%;
          flex-grow: 1;
          text-align: center;
        }

        .button:hover .button__text {
          color: #fff;
        }

        .button:hover .button-decor {
          transform: translate(0);
        }

        /* From Uiverse.io by vinodjangid07 */ 
        .Btn {
          display: flex;
          align-items: center;
          justify-content: flex-start;
          width: 45px;
          height: 45px;
          border: none;
          border-radius: 50%;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition-duration: .3s;
          box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.199);
          background-color: rgb(239, 68, 68);
        }

        /* icon container */
        .sign {
          width: 100%;
          transition-duration: .3s;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .sign span {
          transition-duration: .3s;
          color: white;
        }

        /* text */
        .text {
          position: absolute;
          right: 0%;
          width: 0%;
          opacity: 0;
          color: white;
          font-size: 10px;
          font-weight: 800;
          transition-duration: .3s;
          white-space: nowrap;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }

        /* hover effect on button width */
        .Btn:hover {
          width: 120px;
          border-radius: 40px;
          transition-duration: .3s;
        }

        .Btn:hover .sign {
          width: 35%;
          transition-duration: .3s;
          padding-left: 12px;
        }

        /* hover effect button's text */
        .Btn:hover .text {
          opacity: 1;
          width: 65%;
          transition-duration: .3s;
          padding-right: 15px;
        }

        /* button click effect*/
        .Btn:active {
          transform: translate(2px ,2px);
        }

        /* From Uiverse.io by satyamchaudharydev - Custom tailored for BDMS Student Portal */ 
        .download-btn {
          --width: 100%;
          --height: 48px;
          --tooltip-height: 35px;
          --tooltip-width: 150px;
          --gap-between-tooltip-to-button: 18px;
          --button-color: #0ea5e9;
          --tooltip-color: #0f172a;
          width: var(--width);
          height: var(--height);
          background: var(--button-color);
          position: relative;
          text-align: center;
          border-radius: 1rem;
          font-family: inherit;
          transition: background 0.3s;
          border: none;
          cursor: pointer;
          box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
          overflow: hidden;
          padding: 0 !important;
          margin: 0 !important;
        }

        .download-btn::before {
          position: absolute;
          content: attr(data-tooltip);
          width: var(--tooltip-width);
          height: var(--tooltip-height);
          background-color: var(--tooltip-color);
          font-size: 0.7rem;
          font-weight: 800;
          color: #fff;
          border-radius: .5em;
          line-height: var(--tooltip-height);
          bottom: calc(var(--height) + var(--gap-between-tooltip-to-button) + 10px);
          left: calc(50% - var(--tooltip-width) / 2);
          z-index: 50;
        }

        .download-btn::after {
          position: absolute;
          content: '';
          width: 0;
          height: 0;
          border: 10px solid transparent;
          border-top-color: var(--tooltip-color);
          left: calc(50% - 10px);
          bottom: calc(100% + var(--gap-between-tooltip-to-button) - 10px);
          z-index: 50;
        }

        .download-btn::after, .download-btn::before {
          opacity: 0;
          visibility: hidden;
          transition: all 0.5s;
        }

        .download-btn-text {
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.75rem;
          font-weight: 800;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        }

        .download-btn-wrapper, .download-btn-text, .download-btn-icon {
          overflow: hidden;
          position: absolute;
          width: 100%;
          height: 100%;
          left: 0;
          top: 0;
          color: #fff;
          margin: 0 !important;
          padding: 0 !important;
          box-sizing: border-box !important;
        }

        .download-btn-text, .download-btn-icon {
          transition: top 0.5s;
        }

        .download-btn-icon {
          color: #fff;
          top: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .download-btn:hover {
          background: #0284c7;
        }

        .download-btn:hover .download-btn-text {
          top: -100%;
        }

        .download-btn:hover .download-btn-icon {
          top: 0;
        }

        .download-btn:hover::before, .download-btn:hover::after {
          opacity: 1;
          visibility: visible;
        }

        .download-btn:hover::after {
          bottom: calc(var(--height) + var(--gap-between-tooltip-to-button) - 20px);
        }

        .download-btn:hover::before {
          bottom: calc(var(--height) + var(--gap-between-tooltip-to-button));
        }

          font-size: 0.75rem;
          border-radius: 16px;

        .portal-home-btn:hover {

        }

        .portal-home-btn:active {

        .portal-home-btn::after {

          position: absolute;
          width: 65%;

          right: 0;

        .portal-home-blob {

        }

        /* PWA Tutorial Tooltip Animation */
        @keyframes pwa-tip-in {

        .portal-avatar-ring {

        /* Dynamic Vertical Notice Board Ticker styling */
        .ticker-container {
          height: 520px; /* fixed height container */
          overflow: hidden;
          position: relative;
          border-radius: 28px;
          background: rgba(255, 255, 255, 0.45);
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          border: 1px solid rgba(255, 255, 255, 0.6);
          box-shadow: 
            0 16px 40px rgba(15, 23, 42, 0.08), 
            inset 0 0 0 1.5px rgba(255, 255, 255, 0.7),
            inset 0 10px 20px rgba(255, 255, 255, 0.5),
            inset 0 -10px 20px rgba(0, 0, 0, 0.03); /* subtle claymorphism and liquid glass */
          padding: 32px;
          box-sizing: border-box;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }

        .ticker-track {
          display: flex;
          flex-direction: column;
          gap: 24px;
          animation: scrollVertical 35s linear infinite;
        }

        .ticker-container:hover .ticker-track {
          animation-play-state: paused;
        }

        @keyframes scrollVertical {
          0% {
            transform: translateY(0);
          }
          100% {
            transform: translateY(-50%); /* Scroll through half the items (which are duplicated for seamless looping) */
          }
        }

        .ticker-item {
          background: #ffffff;
          border: 1.5px solid rgba(241, 245, 249, 0.9);
          border-radius: 24px;
          padding: 28px 32px;
          box-shadow: 
            0 4px 6px rgba(15, 23, 42, 0.02),
            0 10px 15px -3px rgba(15, 23, 42, 0.03),
            inset 0 1.5px 0 #ffffff;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          display: flex;
          gap: 20px;
          align-items: flex-start;
          position: relative;
          overflow: hidden;
          cursor: pointer;
          text-align: left;
        }

        /* Single notice special animation classes */
        .single-notice-card {
          padding: 48px 40px !important;
          min-height: 240px !important;
          align-items: center !important;
          animation: singleNoticeGlow 4s ease-in-out infinite !important;
          border: 1.5px solid rgba(14, 165, 233, 0.3) !important;
          position: relative;
          overflow: hidden;
        }

        .single-notice-card::after {
          content: '';
          position: absolute;
          top: 0; 
          left: -100%;
          width: 50%; 
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.15), transparent);
          transform: skewX(-25deg);
          animation: shineSweep 5s infinite;
        }

        @keyframes singleNoticeGlow {
          0% {
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.12), inset 0 1.5px 0 #ffffff;
            border-color: rgba(14, 165, 233, 0.25);
          }
          50% {
            box-shadow: 0 12px 40px rgba(14, 165, 233, 0.25), inset 0 1.5px 0 #ffffff;
            border-color: rgba(14, 165, 233, 0.55);
          }
          100% {
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.12), inset 0 1.5px 0 #ffffff;
            border-color: rgba(14, 165, 233, 0.25);
          }
        }

        @keyframes shineSweep {
          0% { left: -100%; }
          15% { left: 150%; }
          100% { left: 150%; }
        }

        /* Circadian Viewport Animations */
        @keyframes sunRise {
          0% {
            transform: translate(-15px, 28px) scale(0.7);
            filter: brightness(0.7) blur(0.5px);
          }
          100% {
            transform: translate(11px, 6px) scale(1);
            filter: brightness(1.1) blur(0px);
          }
        }

        @keyframes sunHigh {
          0% {
            transform: translate(11px, 6px) scale(1);
            box-shadow: 0 0 10px rgba(245,158,11,0.7);
          }
          50% {
            transform: translate(11px, 6px) scale(1.08);
            box-shadow: 0 0 18px rgba(245,158,11,0.95);
          }
          100% {
            transform: translate(11px, 6px) scale(1);
            box-shadow: 0 0 10px rgba(245,158,11,0.7);
          }
        }

        @keyframes sunSet {
          0% {
            transform: translate(11px, 6px) scale(1);
            filter: brightness(1) blur(0px);
            opacity: 1;
          }
          100% {
            transform: translate(28px, 28px) scale(0.7);
            filter: brightness(0.4) blur(1px);
            opacity: 0;
          }
        }

        @keyframes moonRise {
          0% {
            transform: translate(-15px, 28px) scale(0.6);
            opacity: 0;
          }
          40% {
            transform: translate(-5px, 20px) scale(0.75);
            opacity: 0.2;
          }
          100% {
            transform: translate(11px, 6px) scale(1);
            opacity: 1;
          }
        }

        .sun-rise-animate {
          animation: sunRise 4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        .sun-high-animate {
          animation: sunHigh 4.5s ease-in-out infinite;
        }

        .sun-set-animate {
          animation: sunSet 5s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .moon-rise-animate {
          animation: moonRise 6s cubic-bezier(0.15, 0.85, 0.25, 1) forwards;
        }

        /* Step indicators with connections */
        .step-indicators-wrapper {
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: relative;
          margin-bottom: 50px;
          padding: 0 20px;

        .step-indicators-line {
          position: absolute;
          top: 50%;
          left: 0;
          right: 0;
          height: 4px;
          background: #f1f5f9;
          z-index: 1;
          transform: translateY(-50%);
          border-radius: 2px;

        .step-indicators-line-active {
          position: absolute;
          top: 50%;
          left: 0;
          height: 4px;
          background: #0ea5e9;
          z-index: 2;
          transform: translateY(-50%);

        .step-bubble {
          width: 48px;
          height: 48px;
          border-radius: 50%;

                ctx.font = '900 15px sans-serif';
                ctx.fillText(receipt.date, 220, 660);
                ctx.font = 'bold 14px monospace';
                ctx.fillText(receipt.authCode, 220, 700);

                ctx.font = '900 22px sans-serif';

                // 9. Footers
                ctx.fillStyle = '#94a3b8';
                ctx.font = '500 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('This is a secure system-generated electronic receipt. No physical signature is required.', 400, 960);
                ctx.fillStyle = '#0ea5e9';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText('BDMS Online Finance Portal \u2022 Secure SSL Transaction', 400, 980);

                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `BDMS_Receipt_${receipt.orderId}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            img.src = OFFICIAL_LOGO_BASE64;
        };

        const downloadAdmissionSlip = (student, parent, docs) => {
            if (window.bdms_set_generating_slip) {
                window.bdms_set_generating_slip(true);
            }
            const loadImage = (src) => {
                return new Promise((resolve) => {
                    if (!src) return resolve(null);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = src;
                });
            };

            const photoData = docs?.studentPhoto?.data || null;
            const birthCertData = docs?.birthCert?.data || null;
            const parentIDData = docs?.parentID?.data || null;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 800, 1200);

                // Modern tech accent background (diagonal subtle stripes)
                ctx.fillStyle = '#f8fafc';
                for (let i = 0; i < 800; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i + 20, 0);
                    ctx.lineTo(i - 400, 1200);
                    ctx.lineTo(i - 420, 1200);
                    ctx.closePath();
                    ctx.fill();

                // Page 1 Border & Accents
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 10;
                ctx.strokeRect(5, 5, 790, 1190);

                ctx.strokeStyle = '#38bdf8';

                ctx.strokeRect(15, 15, 770, 1170);

                // Header section
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(20, 20, 760, 140);

        const AdmissionTrackerHub = ({ appRecord, onBack }) => {
            const [messages, setMessages] = useState(appRecord.chat || []);
            const [newMsg, setNewMsg] = useState('');
            const [currentStatus, setCurrentStatus] = useState(appRecord.status);

            const syncMessages = () => {
                const db = JSON.parse(localStorage.getItem('bdms_admissions_db') || '[]');
                const latest = db.find(x => x.id === appRecord.id);
                if (latest) {
                    setMessages(latest.chat || []);
                    setCurrentStatus(latest.status);
                }
            };

            useEffect(() => {
                syncMessages();
                window.addEventListener('bdms_admissions_updated', syncMessages);
                return () => window.removeEventListener('bdms_admissions_updated', syncMessages);
            }, [appRecord.id]);

            const sendMessage = (ev) => {
                ev.preventDefault();
                if (!newMsg.trim()) return;

                const msgObj = {
                    sender: 'user',
                    text: newMsg,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                const db = JSON.parse(localStorage.getItem('bdms_admissions_db') || '[]');
                const updated = db.map(x => {
                    if (x.id === appRecord.id) {
                        const currentChat = x.chat || [];
                        return { ...x, chat: [...currentChat, msgObj] };
                    }
                    return x;
                });

                localStorage.setItem('bdms_admissions_db', JSON.stringify(updated));
                setMessages(prev => [...prev, msgObj]);
                setNewMsg('');
                window.dispatchEvent(new Event('bdms_admissions_updated'));

                // Add a dynamic simulation reply from verification team for demo purposes
                setTimeout(() => {
                    const latestDb = JSON.parse(localStorage.getItem('bdms_admissions_db') || '[]');
                    const currentRecord = latestDb.find(x => x.id === appRecord.id);
                    if (!currentRecord) return;
                    const lastMsg = currentRecord.chat[currentRecord.chat.length - 1];
                    if (lastMsg && lastMsg.sender === 'user') {
                        let autoText = "Your query has been logged in the verification desk. Officer Rahul Kumar is currently reviewing your documents.";
                        if (newMsg.toLowerCase().includes('document') || newMsg.toLowerCase().includes('pdf') || newMsg.toLowerCase().includes('photo')) {
                            autoText = "Yes, please ensure all file uploads are under 5MB and fully legible. If a scan is blurry, you can let us know.";
                        } else if (newMsg.toLowerCase().includes('verify') || newMsg.toLowerCase().includes('approve') || newMsg.toLowerCase().includes('status')) {
                            autoText = "Application verification typically takes 1-2 business days. We will update the status of your admission right here.";
                        }
                        
                        const replyObj = {
                            sender: 'admin',
                            text: autoText,
                            timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        };
                        
                        const dbWithReply = latestDb.map(x => {
                            if (x.id === appRecord.id) {
                                return { ...x, chat: [...x.chat, replyObj] };
                            }
                            return x;
                        });
                        localStorage.setItem('bdms_admissions_db', JSON.stringify(dbWithReply));
                        window.dispatchEvent(new Event('bdms_admissions_updated'));
                    }
                }, 2000);
            };

            const statusStyles = 
                currentStatus === 'Approved' ? 'bg-emerald-500 text-white' :
                currentStatus === 'Rejected' ? 'bg-red-500 text-white' :

                setParentForm(prev => ({ ...prev, [f]: v }));

            };

            const validateStep1 = () => {
                const errs = {};

                if (!studentForm.lastName.trim()) errs.lastName = 'Last Name is required';
                if (!studentForm.dob) errs.dob = 'Date of Birth is required';
                if (!studentForm.gender) errs.gender = 'Gender is required';
                if (studentForm.grade === 'Select Grade') errs.grade = 'Please select a Grade';
                
                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const validateStep2 = () => {
                const errs = {};
                if (!parentForm.parentName.trim()) errs.parentName = 'Parent/Guardian Full Name is required';
                if (parentForm.relationship === 'Select Relationship') errs.relationship = 'Please select Relationship';
                
                const phoneReg = /^[6-9]\d{9}$/;
                if (!parentForm.phone.trim()) {
                    errs.phone = 'Mobile Number is required';
                } else if (!phoneReg.test(parentForm.phone.trim())) {
                    errs.phone = 'Please enter a valid 10-digit mobile number';
                }

                const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!parentForm.email.trim()) {
                    errs.email = 'Email Address is required';
                } else if (!emailReg.test(parentForm.email.trim())) {
                    errs.email = 'Please enter a valid email format';
                }

                if (!parentForm.address.trim()) errs.address = 'Residential Address is required';

                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const validateStep3 = () => {
                const errs = {};
                if (!docs.studentPhoto) errs.studentPhoto = 'Student Passport Photo is required';
                if (!docs.birthCert) errs.birthCert = 'Student Aadhaar Card is required';

                return Object.keys(errs).length === 0;

            };

            const handleFileUpload = (field, e_file) => {
                const file = e_file.target.files[0];
                if (!file) return;

                // Validate File size (Max 100MB)
                if (file.size > 100 * 1024 * 1024) {
                    setErrors(prev => ({ ...prev, [field]: 'File size exceeds limit of 100MB.' }));
                    return;
                }

                // Validate File type
                const allowedTypes = ['image/jpeg', 'image/png', 'application/pdf'];
                if (!allowedTypes.includes(file.type)) {
                    setErrors(prev => ({ ...prev, [field]: 'Upload PDF, PNG or JPG only.' }));
                    return;
                }

                setRawFiles(prev => ({ ...prev, [field]: file }));

                // Remove error
                if (errors[field]) {
                    setErrors(prev => { const n = {...prev}; delete n[field]; return n; });
                }

                const reader = new FileReader();
                reader.onloadend = () => {
                    const rawData = reader.result;
                    if (file.type.startsWith('image/')) {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                             const max_size = 1200; // increased resolution for higher quality document rendering
                             if (width > height) {
                                 if (width > max_size) {
                                     height *= max_size / width;
                                     width = max_size;
                                 }
                             } else {
                                 if (height > max_size) {
                                     width *= max_size / height;
                                     height = max_size;
                                 }
                             }
                             canvas.width = width;
                             canvas.height = height;
                             const ctx = canvas.getContext('2d');
                             ctx.drawImage(img, 0, 0, width, height);
                             const compressed = canvas.toDataURL('image/jpeg', 0.85); // 85% quality jpeg for crisp rendering
                            setDocs(prev => ({
                                ...prev,
                                [field]: {
                                    name: file.name,
                                    size: (compressed.length / 1333).toFixed(1) + ' KB',
                                    type: 'image/jpeg',
                                    data: compressed
                                }
                            }));
                        };
                        img.src = rawData;
                    } else {
                        // PDF File
                        setDocs(prev => ({
                            ...prev,
                            [field]: {
                                name: file.name,
                                size: (file.size / 1024).toFixed(1) + ' KB',
                                type: file.type,
                                data: rawData
                            }
                        }));
                    }
                };
                reader.readAsDataURL(file);
            };

                setDocs(prev => ({ ...prev, [field]: null }));
                setRawFiles(prev => ({ ...prev, [field]: null }));
            };             const handleSubmit = (ev) => {

                        },

                        chat: [

                        ]
                    };

                    try {
                        const existingAdmissions = JSON.parse(localStorage.getItem('bdms_admissions_db') || '[]');
                        localStorage.setItem('bdms_admissions_db', JSON.stringify([newAdmission, ...existingAdmissions]));
                        window.dispatchEvent(new Event('bdms_admissions_updated'));
                        if (window.showNotification) {
                            window.showNotification('Application Submitted', 'Your admission form has been received.', 'check', 'emerald');
                        }
                        createdApp = newAdmission;
                    } catch (e) {
                        console.error('Error saving admission record', e);
                        try {
                            const existingAdmissions = JSON.parse(localStorage.getItem('bdms_admissions_db') || '[]');
                            const cleanedExisting = existingAdmissions.map(adm => ({
                                ...adm,
                                docs: {
                                    studentPhoto: adm.docs?.studentPhoto ? { ...adm.docs.studentPhoto, data: '' } : null,
                                    birthCert: adm.docs?.birthCert ? { ...adm.docs.birthCert, data: '' } : null,
                                    parentID: adm.docs?.parentID ? { ...adm.docs.parentID, data: '' } : null
                                }
                            }));
                            localStorage.setItem('bdms_admissions_db', JSON.stringify([newAdmission, ...cleanedExisting]));
                            window.dispatchEvent(new Event('bdms_admissions_updated'));
                            if (window.showNotification) {
                                window.showNotification('Application Submitted', 'Your admission form has been received.', 'check', 'emerald');
                            }
                            createdApp = newAdmission;
                        } catch (fallbackErr) {
                            const fallbackDocs = {
                                studentPhoto: newAdmission.docs.studentPhoto ? { ...newAdmission.docs.studentPhoto, data: '' } : null,
                                birthCert: newAdmission.docs.birthCert ? { ...newAdmission.docs.birthCert, data: '' } : null,
                                parentID: newAdmission.docs.parentID ? { ...newAdmission.docs.parentID, data: '' } : null
                            };
                            const fallbackAdmission = { ...newAdmission, docs: fallbackDocs };
                            try {
                                localStorage.setItem('bdms_admissions_db', JSON.stringify([fallbackAdmission, ...cleanedExisting]));
                                window.dispatchEvent(new Event('bdms_admissions_updated'));
                                createdApp = fallbackAdmission;
                            } catch (criticalErr) {
                                alert('Local database storage is full. Please clear your browser storage or try again with smaller files.');
                            }
                        }
                    }
                    setStatus('success');
                    if (createdApp) {
                        setActiveTrackedApp(createdApp);
                    }
                };

                const formData = new FormData();

                fetch('/api/admission/submit', {

                            e('div', { className: 'p-3 bg-sky-50/50 rounded-2xl border border-sky-100/50' }, [
                                e('div', { className: 'text-sky-600 flex justify-center mb-1' }, e(Icon, { n: 'wifi-off', size: 18 })),
                                e('p', { className: 'text-[10px] font-black text-slate-700' }, 'Offline Access')
                            ]),
                            e('div', { className: 'p-3 bg-indigo-50/50 rounded-2xl border border-indigo-100/50' }, [
                                e('div', { className: 'text-indigo-600 flex justify-center mb-1' }, e(Icon, { n: 'zap', size: 18 })),
                                e('p', { className: 'text-[10px] font-black text-slate-700' }, '10x Faster')
                            ]),
                            e('div', { className: 'p-3 bg-emerald-50/50 rounded-2xl border border-emerald-100/50' }, [
                                e('div', { className: 'text-emerald-600 flex justify-center mb-1' }, e(Icon, { n: 'bell', size: 18 })),
                                e('p', { className: 'text-[10px] font-black text-slate-700' }, 'Live Updates')
                            ])
                        ]),

                        // Primary CTAs or Download progress bar
                        isDownloading ? e('div', { className: 'w-full flex flex-col items-center mt-4' }, [
                            // Progress bar outer track
                            e('div', { className: 'w-full bg-slate-100 h-3.5 rounded-full overflow-hidden relative shadow-inner border border-slate-200/20' }, 
                                // Progress bar inner fill
                                e('div', { 
                                    className: 'bg-gradient-to-r from-sky-500 via-sky-600 to-indigo-600 h-full rounded-full transition-all duration-150 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]', 
                                    style: { width: downloadProgress + '%' } 
                                })
                            ),
                            // Progress percentage
                            e('span', { className: 'text-sm font-black text-sky-600 mt-3 tracking-wide' }, downloadProgress + '%'),
                            // Status text
                            e('p', { className: 'text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-2.5 px-4 text-center leading-relaxed min-h-[32px]' }, downloadStatusText)
                        ]) : e('div', { className: 'w-full flex flex-col gap-3' }, [
                            e('button', { 
                                onClick: triggerInstall, 
                                className: 'w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-sky-500 via-sky-600 to-indigo-600 text-white font-black text-xs hover:shadow-lg hover:shadow-sky-500/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2' 
                            }, [
                                e(Icon, { n: 'download', size: 16 }),
                                'Download & Automatic Install'
                            ]),
                            e('button', { 
                                onClick: () => {
                                    // Just close for now - nav button can still reopen it
                                    setShowInstallBanner(false);
                                }, 
                                className: 'w-full py-4 px-6 rounded-2xl bg-slate-100 text-slate-500 font-black text-xs hover:bg-slate-200 transition-colors' 
                            }, 'Continue to Website')
                        ])
                    ])
                ),

                // Admission Slip Preview Modal
                activeSlipPreview && e(SlipPreviewModal, { 
                    preview: activeSlipPreview, 
                    onClose: () => setActiveSlipPreview(null) 
                }),

                // Loader overlay for slip generation
                isGeneratingSlip && e('div', { className: 'fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[9999999] flex flex-col items-center justify-center text-white' }, [
                    e('div', { className: 'w-16 h-16 bg-white/10 rounded-2xl border border-white/20 flex items-center justify-center mb-4' }, 
                        e(Icon, { n: 'loader-2', size: 32, cls: 'animate-spin text-sky-400' })
                    ),
                    e('h3', { className: 'text-sm font-black tracking-wider uppercase text-slate-100 mt-2' }, 'Generating Admission Slip'),
                    e('p', { className: 'text-[10px] text-slate-400 font-bold uppercase mt-1.5' }, 'Rendering high resolution pages...')
                ]),

                // Global Toast Notifications Container (Mobile specific)
                e('div', { className: 'md:hidden fixed top-20 left-4 right-4 z-[99999999] pointer-events-none space-y-2' },
                    globalToasts.map(toast => 
                        e('div', { 
                            key: toast.id,
                            onClick: () => setGlobalToasts(q => q.filter(t => t.id !== toast.id)),
                            className: 'bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between animate-fade-in pointer-events-auto cursor-pointer border border-slate-700' 
                        }, [
                            e('div', { className: 'flex items-center gap-3' }, [
                                e('div', { className: `w-10 h-10 bg-${toast.color}-500/20 text-${toast.color}-400 rounded-full flex items-center justify-center animate-pulse shrink-0 border border-${toast.color}-500/30` }, e(Icon, { n: toast.icon, size: 18 })),
                                e('div', null, [
                                    e('p', { className: `text-[9px] font-bold text-${toast.color}-400 uppercase tracking-widest mb-0.5` }, toast.title),
                                    e('h4', { className: 'text-xs font-black leading-tight' }, toast.message),
                                ])
                            ]),
                            e(Icon, { n: 'x', size: 16, cls: 'text-slate-400' })
                        ])
                    )
                )
            ]);
        };
        // Cleanup bloated legacy data URLs to prevent QuotaExceededError
        try {
            const rawDb = localStorage.getItem('bdms_admissions_db');
            if (rawDb) {
                const db = JSON.parse(rawDb);
                let migrated = false;
                const cleaned = db.map(adm => {
                    let recordMigrated = false;
                    const cleanDocs = { ...adm.docs };
                    if (cleanDocs.birthCert && cleanDocs.birthCert.data && cleanDocs.birthCert.data.length > 2000000) {
                        cleanDocs.birthCert = { ...cleanDocs.birthCert, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.parentID && cleanDocs.parentID.data && cleanDocs.parentID.data.length > 2000000) {
                        cleanDocs.parentID = { ...cleanDocs.parentID, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.studentPhoto && cleanDocs.studentPhoto.data && cleanDocs.studentPhoto.data.length > 2000000) {
                        cleanDocs.studentPhoto = { ...cleanDocs.studentPhoto, data: '' };
                        recordMigrated = true;
                    }
                    if (recordMigrated) migrated = true;
                    return { ...adm, docs: cleanDocs };
                });
                if (migrated) {
                    localStorage.setItem('bdms_admissions_db', JSON.stringify(cleaned));
                    console.log('Sanitized local admissions database: cleared heavy file uploads.');
                }
            }
        } catch (e) {
            console.error('Failed to run admissions database migration:', e);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('[PWA] Service Worker registered successfully:', reg.scope))
                    .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
