<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDMS Administrative Desk | Staff Terminal</title>
    <link rel="icon" type="image/png" href="../logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #0b1329;
            --clay-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            --clay-shadow-sm: 10px 10px 30px #bebebe, -10px -10px 30px #ffffff;
            --clay-inset: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            overflow-x: hidden; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .clay-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                inset -5px -5px 15px rgba(255, 255, 255, 0.05),
                inset 5px 5px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .clay-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(14, 165, 233, 0.25);
            box-shadow: 0 40px 80px rgba(14, 165, 233, 0.1);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-text { background: linear-gradient(135deg, #0ea5e9 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeInUp 0.8s ease-out forwards; }
        .fade-down { animation: fadeInUp 0.5s ease-out reverse forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        /* Uiverse logout button adaptation */
        .Btn {
          display: flex;
          align-items: center;
          justify-content: flex-start;
          width: 45px;
          height: 45px;
          border: none;
          border-radius: 50%;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition-duration: .3s;
          box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
          background-color: rgb(239, 68, 68);
        }
        .sign {
          width: 100%;
          transition-duration: .3s;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .text {
          position: absolute;
          right: 0%;
          width: 0%;
          opacity: 0;
          color: white;
          font-size: 10px;
          font-weight: 800;
          transition-duration: .3s;
          white-space: nowrap;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }
        .Btn:hover {
          width: 120px;
          border-radius: 40px;
          transition-duration: .3s;
        }
        .Btn:hover .sign {
          width: 35%;
          transition-duration: .3s;
          padding-left: 12px;
        }
        .Btn:hover .text {
          opacity: 1;
          width: 65%;
          transition-duration: .3s;
          padding-right: 15px;
        }
        .Btn:active {
          transform: translate(2px ,2px);
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="root"></div>

    <script>
        // One-time Reset of Local Storage Admissions Database to Clear Legacy Bloated/Wiped Records
        if (!localStorage.getItem('bdms_db_reset_2026_05_20')) {
            localStorage.removeItem('bdms_admissions_db');
            localStorage.setItem('bdms_db_reset_2026_05_20', 'true');
            console.log('Database reset to clean state successfully.');
        }

        const e = React.createElement, { useState, useEffect } = React;

        // Custom Dynamic Icon component matching primary app
        const Icon = ({ n, cls, size = 18 }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (containerRef.current && typeof lucide !== 'undefined') {
                    containerRef.current.innerHTML = `<i data-lucide="${n}" style="width: ${size}px; height: ${size}px; display: inline-flex;"></i>`;
                    lucide.createIcons({
                        targets: [containerRef.current.firstChild]
                    });
                }
            }, [n, size]);
            return e('span', { 
                key: n + size, 
                ref: containerRef, 
                className: 'inline-flex items-center justify-center ' + (cls || '') 
            });
        };

        const useWindowSize = () => {
            const [width, setWidth] = useState(window.innerWidth);
            useEffect(() => {
                const handleResize = () => setWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            return width;
        };

        const openBase64Document = (dataUrl, filename = 'document') => {
            if (!dataUrl) return;
            if (!dataUrl.startsWith('data:')) {
                const fullUrl = dataUrl.startsWith('/') || dataUrl.startsWith('http') ? dataUrl : `/uploads/${dataUrl}`;
                window.open(fullUrl, '_blank');
                return;
            }
            try {
                const arr = dataUrl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                const blob = new Blob([u8arr], { type: mime });
                const fileUrl = URL.createObjectURL(blob);
                
                const newWin = window.open();
                if (newWin) {
                    newWin.document.write(`
                        <html>
                            <head>
                                <title>${filename}</title>
                                <style>
                                    body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0f172a; height: 100vh; font-family: system-ui, -apple-system, sans-serif; color: #f8fafc; }
                                    .container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; position: relative; }
                                    iframe { width: 100%; height: calc(100vh - 60px); border: none; }
                                    img { max-width: 90%; max-height: 85%; object-fit: contain; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
                                    .header-bar { display: flex; width: 100%; height: 60px; background: #1e293b; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; border-bottom: 1px solid #334155; }
                                    .btn { background: #0ea5e9; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; transition: all 0.2s; }
                                    .btn:hover { background: #0284c7; transform: translateY(-1px); }
                                    .title { font-size: 14px; font-weight: 800; color: #f1f5f9; }
                                </style>
                            </head>
                            <body>
                                <div class="container">
                                    <div class="header-bar">
                                        <span class="title">${filename}</span>
                                        <a href="${fileUrl}" download="${filename}" class="btn">Download Document</a>
                                    </div>
                                    ${mime.includes('pdf') 
                                        ? `<iframe src="${fileUrl}"></iframe>` 
                                        : `<div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%;"><img src="${fileUrl}" alt="${filename}" /></div>`
                                    }
                                </div>
                            </body>
                        </html>
                    `);
                    newWin.document.close();
                } else {
                    const link = document.createElement('a');
                    link.href = fileUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } catch (e) {
                console.error('Error opening document:', e);
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const SlipPreviewModal = ({ preview, onClose }) => {
            const [currentPage, setCurrentPage] = useState(1);
            if (!preview) return null;
            const docs = preview.docs || {};
            const photoData = docs.studentPhoto?.data || null;
            const birthCertData = docs.birthCert?.data || null;
            const parentIDData = docs.parentID?.data || null;

            return e('div', { className: 'fixed inset-0 bg-slate-950/60 backdrop-blur-md z-[99999] flex items-center justify-center p-4 md:p-6 overflow-y-auto' }, [
                e('div', { className: 'bg-slate-900/90 border border-slate-700/60 rounded-3xl max-w-4xl w-full p-4 md:p-6 shadow-2xl relative flex flex-col max-h-[90vh]' }, [
                    // Header
                    e('div', { className: 'flex justify-between items-center border-b border-slate-800 pb-4 mb-4' }, [
                        e('div', {}, [
                            e('h3', { className: 'text-base md:text-lg font-black text-white tracking-tight' }, 'Admission Slip Preview'),
                            e('p', { className: 'text-[10px] text-sky-400 font-extrabold uppercase tracking-wider' }, `REG NO: ${preview.regNo}`)
                        ]),
                        e('button', { 
                            onClick: onClose,
                            className: 'w-8 h-8 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white flex items-center justify-center transition-all cursor-pointer'
                        }, e(Icon, { n: 'x', size: 16 }))
                    ]),

                    // Page preview container
                    e('div', { className: 'flex-1 overflow-y-auto flex justify-center bg-slate-950/40 rounded-2xl border border-slate-850 p-4 min-h-[300px] mb-4 relative' }, [
                        e('div', { className: 'relative max-w-full h-auto flex justify-center overflow-hidden' }, [
                            e('img', { 
                                src: currentPage === 1 ? preview.page1Url : preview.page2Url,
                                className: 'max-w-full h-auto object-contain rounded-xl shadow-lg border border-slate-800 transition-all duration-300'
                            }),
                            
                            currentPage === 1 && photoData && e('button', {
                                onClick: () => openBase64Document(photoData, docs.studentPhoto?.name || 'student_photo.jpg'),
                                title: 'Click to open Student Photo',
                                style: {
                                    position: 'absolute',
                                    left: '70%',
                                    top: '32.5%',
                                    width: '17.5%',
                                    height: '13.33%',
                                },
                                className: 'cursor-pointer border border-transparent hover:border-sky-500 hover:bg-sky-500/10 transition-all rounded-lg flex items-center justify-center group'
                            }, [
                                e('div', { className: 'opacity-0 group-hover:opacity-100 bg-slate-950/90 text-white text-[8px] font-bold px-2 py-1 rounded backdrop-blur-sm transition-opacity shadow-md pointer-events-none' }, 'Open Photo')
                            ]),

                            currentPage === 2 && birthCertData && e('button', {
                                onClick: () => openBase64Document(birthCertData, docs.birthCert?.name || 'student_aadhaar.pdf'),
                                title: 'Click to open Student Aadhaar Card',
                                style: {
                                    position: 'absolute',
                                    left: '8.75%',
                                    top: '21.67%',
                                    width: '37.5%',
                                    height: '35.0%',
                                },
                                className: 'cursor-pointer border border-transparent hover:border-sky-500 hover:bg-sky-500/10 transition-all rounded-xl flex items-center justify-center group'
                            }, [
                                e('div', { className: 'opacity-0 group-hover:opacity-100 bg-slate-950/90 text-white text-[8px] font-bold px-2 py-1 rounded backdrop-blur-sm transition-opacity shadow-md pointer-events-none' }, 'Open Aadhaar')
                            ]),

                            currentPage === 2 && parentIDData && e('button', {
                                onClick: () => openBase64Document(parentIDData, docs.parentID?.name || 'parent_id.jpg'),
                                title: 'Click to open Parent ID Card',
                                style: {
                                    position: 'absolute',
                                    left: '53.75%',
                                    top: '21.67%',
                                    width: '37.5%',
                                    height: '35.0%',
                                },
                                className: 'cursor-pointer border border-transparent hover:border-sky-500 hover:bg-sky-500/10 transition-all rounded-xl flex items-center justify-center group'
                            }, [
                                e('div', { className: 'opacity-0 group-hover:opacity-100 bg-slate-950/90 text-white text-[8px] font-bold px-2 py-1 rounded backdrop-blur-sm transition-opacity shadow-md pointer-events-none' }, 'Open Parent ID')
                            ])
                        ])
                    ]),

                    // Attachments
                    (photoData || birthCertData || parentIDData) && e('div', { className: 'flex flex-wrap gap-2 justify-center border-b border-slate-800 pb-3 mb-3' }, [
                        e('span', { className: 'text-[9px] font-black text-slate-500 uppercase self-center mr-2' }, 'Attachments:'),
                        photoData && e('button', {
                            onClick: () => openBase64Document(photoData, docs.studentPhoto?.name || 'student_photo.jpg'),
                            className: 'px-3 py-1.5 bg-slate-850 hover:bg-sky-950 border border-slate-750 hover:border-sky-850 text-slate-300 hover:text-sky-400 rounded-lg text-[10px] font-extrabold flex items-center gap-1.5 transition-all cursor-pointer'
                        }, [e(Icon, { n: 'image', size: 10 }), 'Student Photo']),
                        birthCertData && e('button', {
                            onClick: () => openBase64Document(birthCertData, docs.birthCert?.name || 'student_aadhaar.pdf'),
                            className: 'px-3 py-1.5 bg-slate-850 hover:bg-sky-950 border border-slate-750 hover:border-sky-850 text-slate-300 hover:text-sky-400 rounded-lg text-[10px] font-extrabold flex items-center gap-1.5 transition-all cursor-pointer'
                        }, [e(Icon, { n: 'file-text', size: 10 }), 'Student Aadhaar']),
                        parentIDData && e('button', {
                            onClick: () => openBase64Document(parentIDData, docs.parentID?.name || 'parent_id.jpg'),
                            className: 'px-3 py-1.5 bg-slate-850 hover:bg-sky-950 border border-slate-750 hover:border-sky-850 text-slate-300 hover:text-sky-400 rounded-lg text-[10px] font-extrabold flex items-center gap-1.5 transition-all cursor-pointer'
                        }, [e(Icon, { n: 'credit-card', size: 10 }), 'Parent ID Card'])
                    ]),

                    // Navigation & Download controls
                    e('div', { className: 'flex flex-col sm:flex-row justify-between items-center gap-4 pt-2 border-t border-slate-800' }, [
                        // Page indicators
                        e('div', { className: 'flex gap-2' }, [
                            e('button', {
                                onClick: () => setCurrentPage(1),
                                className: `px-3.5 py-1.5 rounded-lg text-xs font-black transition-all cursor-pointer ${currentPage === 1 ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-800 text-slate-400 hover:bg-slate-750'}`
                            }, 'Page 1'),
                            e('button', {
                                onClick: () => setCurrentPage(2),
                                className: `px-3.5 py-1.5 rounded-lg text-xs font-black transition-all cursor-pointer ${currentPage === 2 ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-800 text-slate-400 hover:bg-slate-750'}`
                            }, 'Page 2')
                        ]),

                        // Action button
                        e('button', {
                            onClick: () => {
                                preview.download();
                                onClose();
                            },
                            className: 'w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white rounded-xl text-xs font-black transition-all hover:shadow-lg active:scale-95 flex items-center justify-center gap-2 cursor-pointer border border-emerald-500/20'
                        }, [e(Icon, { n: 'download', size: 14 }), 'Download PDF Slip ✦'])
                    ])
                ])
            ]);
        };

        const OFFICIAL_LOGO_BASE64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHgAAAB4CAYAAAA5ZDbSAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAF0PSURBVHhe7V0FdFTXuj5+zng8AYIH1+IF2tCW4sWDJgQIDnUq1NJSo6VKS1tqFKlAhdLi7i7BPQQSIsTdZuZ769/nTIjR0nvfe/fe9/qvtVcyM0f3v3+XzXF/w9/wfwFWNu8YtNK/QfeHQzrZK//2N/yHwltdu9rOBtcdct3uvfQmp6UmcxIuiur1Kzb/zw7XqN2LCwtTKp/zN/wHwJnAWp0vW73eu8kr10o4Hi6JR24HH6RHNEdWGx+4OQGZnIgbonrhks3y6qbg4FaVr/E3/JvBJ61aeV/zDpiSafLZm80pKOEEZDVxIPOxVsje3g9FBeNRgqkoyRqD/N96I31yM2TXd8DNcUjjeGey5rPuhHfA6PDWrS2Vr/03/AvhcoMG3ZJt3gtvcmJ8IcehwC4jfXAwsr6/H0VZE+HGJABj4cJouFwj4MJwlGA83JiOouQIZHx9H7J614XTpKKE43BDFC+fC/B5c1fj+q0r3+tv+F+CxW1CvS74eI1LMJt25nICnByH9OYO3Hy+NfJOEQInwY3xAMbAhZEMuU6MgNsdBrhHwQ0aYQD7S8gej7wjQ5D+eBvk17cDnIg0TnbGWawbDvr7hz3epYup8jP8Df8DcDSoQYdUh+9HmbySQEgttEq4ObQusr4LRVHmSMCgVieGwoUwhlD97wiAhmsk4BrDhpshfCScRNkYwc6j84uSxyD7m1BkPxgMp6ygmBNwU1QuXXb4vLk90Ltl5Wf6G/5JWNymjdclf/9xaZJtCylGLo5DTjM7Mua0Qe6JQXAySiUqJGQR0kbpiHSPZJQKjIbbPdqg1hFsMGQzyh4Ft5N+p+/D4MQYNoBIuDAeBfsHIvORFgZV80jnhNJrJuu6k4G1R3wcGmat/Kx/w1+AozXqtE/X7B/mcOZ4Jyeg2Cri5kPBSF95H4rSdSQQ8ogFE7IqDkJs5e/ubOiLYrgxIgBMRmHyWGR+fQ9yQ4mqZZRyElIF09VYb8cba+rWbVb52f+G28CG5s19bgQET0ox2bamciJA1NrcjtTn2yLv2CC42YRHopjJVGK3IxmbrYykf2oQB2AUTlRNC4iompA+Hi5MROHugUh/vCVy6lvZ86VxUvF1u331/lpBQ4cPH/63rK4OTjZs2v663ev9bM56gxScQoeAlAE1kPZtDxRkE7sk2ToO8MhV90i43KMZIIUMIVRiDL8uDUMpTTZIKv92D2eI1Fn4GLgK1U3k6E/O2z9G2z/eQY43e62P7v+4MKy/yXH5h9e/H0P/39g/p53Ttfv8W5fM982nO3L4D6Fp3p5O4/B0/6/cEw/tH027u56/9eA1dG8y5f/r4Wf6/4f+jX+hM/9lSg/QzRfywW0q31g+xL++tD+mF3P8K7xX5d8Glaeqqg1N005JknSMFvNUXZAlSSpTFOWApmlP22w2N23g2Wy2/pIkve8xlizLI1VVnS1JEol5yBAslmW5f4mizKZ9yGvV/wOapv0oyzJ1j3hGkuUYWZYuG65wgiDIFvPkFfG3yZzE9yQn2Hl6uQW8yV/289t59v0/A47vDzn/r/Nvfcv3FUX5URCEMZIkPe4xliRJD6uqukmSpOuGYJKm4P9TknK/rCiHpWle/mXpQx7BoiBYyB4UqG8i+Bov6vL64V7g5es5uUqL59f7d/Z1Nmv/94dO8L9TevjX5wQ/h36M+FkX5EmeZ1k8n5G9eF6xXhQW8W/Xb73O543tB1kE8Tq3B10lE2jV/7sS/b/88L/+t0iUzz1/G/2O98rO0x/WfV74/kPvT5/7j95fKssD4Z76Pz7P/v8W/w0csqpYFfU6/o6/44+4Tpb9f/0b                 const downloadAdmissionSlip = (student, parent, docs, isPreview = false) => {
            if (isPreview) {
                if (typeof window.bdms_set_generating_slip === 'function') {
                    window.bdms_set_generating_slip(true);
                }
            }
            const loadImage = (src) => {
                return new Promise((resolve) => {
                    if (!src) return resolve(null);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = src;
                });
            };

            const logoSrc = typeof OFFICIAL_LOGO_BASE64 !== 'undefined' ? OFFICIAL_LOGO_BASE64 : null;
            const photoSrc = (docs && docs.studentPhoto && docs.studentPhoto.data) ? docs.studentPhoto.data : null;
            const signatureSrc = (docs && docs.parentSignature && docs.parentSignature.data) ? docs.parentSignature.data : null;
            const parentIDSrc = (docs && docs.parentID && docs.parentID.data) ? docs.parentID.data : null;
            const birthCertSrc = (docs && docs.birthCert && docs.birthCert.data) ? docs.birthCert.data : null;

            Promise.all([
                loadImage(logoSrc),
                loadImage(photoSrc),
                loadImage(signatureSrc),
                loadImage(parentIDSrc),
                loadImage(birthCertSrc)
            ]).then(([logoImg, photoImg, sigImg, parentIDImg, birthCertImg]) => {
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 2400; // Multi-page structure: 2 pages of 800x1200
                const ctx = canvas.getContext('2d');

                if (!email.includes('@')) return alert('Please enter a valid email');
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setStep('otp');
                }, 1200);
            };

            const handleVerify = (ev) => {
                ev.preventDefault();
                if (otp === '123456') {
                    localStorage.setItem('bdms_staff_session', 'authorized');
                    setStep('authorized');
                } else {
                    alert('Invalid OTP. Use demo code: 123456');
                }
            };

            if (step === 'email') {
                return e('div', { key: 'email-view', className: 'pt-20 pb-6 px-4 md:pt-40 md:pb-20 md:px-6 min-h-[80vh] flex items-center justify-center' },
                    e('div', { className: 'clay-card max-w-md w-full p-6 md:p-12 text-center border border-slate-800' },
                        e('div', { className: 'w-16 h-16 md:w-20 md:h-20 bg-slate-900 text-white rounded-2xl md:rounded-[2rem] flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-xl border border-slate-800' }, e(Icon, { n: 'mail', size: 28, cls: 'text-sky-400' })),
                        e('h2', { className: 'text-xl md:text-2xl font-black mb-1 md:mb-2 text-white' }, 'Staff Authentication'),
                        e('p', { className: 'text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-6 md:mb-8' }, 'Enter school email to receive OTP'),
                        e('form', { onSubmit: handleSendOTP },
                            e('input', { 
                                type: 'email', 
                                className: 'w-full p-4 rounded-xl bg-slate-950 text-white border border-slate-800 mb-6 text-center font-bold', 
                                placeholder: 'staff@bdmodern.com',
                                value: email,
                                onChange: e_input => setEmail(e_input.target.value),
                                required: true
                            }),
                            e('button', { 
                                type: 'submit',
                                className: 'w-full bg-sky-500 hover:bg-sky-600 text-white p-4 rounded-xl font-bold transition-all hover:scale-102 flex items-center justify-center gap-2' 
                            }, loading ? 'Sending OTP...' : e('span', { className: 'flex items-center gap-2 font-black text-xs uppercase' }, e(Icon, { n: 'send', size: 16 }), 'Send Verification Code'))
                        )
                    )
                );
            }

            if (step === 'otp') {
                return e('div', { key: 'otp-view', className: 'pt-20 pb-6 px-4 md:pt-40 md:pb-20 md:px-6 min-h-[80vh] flex items-center justify-center' },
                    e('div', { className: 'clay-card max-w-md w-full p-6 md:p-12 text-center border border-slate-800' },
                        e('div', { className: 'w-16 h-16 md:w-20 md:h-20 bg-sky-500/20 text-sky-400 rounded-2xl md:rounded-[2rem] flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-xl border border-sky-500/30' }, e(Icon, { n: 'lock', size: 28 })),
                        e('h2', { className: 'text-xl md:text-2xl font-black mb-1 md:mb-2 text-white' }, 'Verify OTP'),
                        e('p', { className: 'text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1' }, 'Code sent to'),
                        e('p', { className: 'text-sky-400 text-xs md:text-sm font-bold mb-6' }, email),
                        e('form', { onSubmit: handleVerify },
                            e('input', { 
                                type: 'text', 
                                maxLength: 6,
                                className: 'w-full p-4 rounded-xl bg-slate-950 text-white border border-slate-800 mb-6 text-center font-black text-2xl tracking-[0.5em] focus:outline-none focus:border-sky-500', 
                                placeholder: '000000',
                                value: otp,
                                onChange: e_input => setOtp(e_input.target.value),
                                required: true
                            }),
                            e('button', { 
                                type: 'submit',
                                className: 'w-full bg-sky-500 hover:bg-sky-600 text-white p-4 rounded-xl font-black text-xs uppercase transition-all hover:scale-102' 
                            }, 'Verify & Login'),
                            e('button', { 
                                type: 'button',
                                onClick: () => setStep('email'),
                                className: 'mt-6 text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-slate-400 block mx-auto' 
                            }, 'Change Email')
                        )
                    )
                );
            }

            return e('div', { key: 'auth-view', className: 'pt-10 pb-6 px-4 md:pt-16 md:pb-20 md:px-6' },
                e('div', { className: 'max-w-7xl mx-auto' },
                    e('div', { className: 'flex justify-between items-center mb-6 md:mb-12' },
                        e('div', null,
                            e('h1', { className: 'text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-3' }, [
                                e('img', { src: '../logo.png', className: 'w-8 h-8 md:w-10 md:h-10 object-contain' }),
                                e('span', null, ['BDMS Staff Desk ', e('span', { className: 'text-sky-500' }, '✦ Office')])
                            ]),
                            e('p', { className: 'text-sky-400 text-[9px] md:text-xs font-bold uppercase tracking-widest mt-1 hidden md:block' }, `Authorized Central Terminal Console`)
                        ),
                        e('button', { onClick: logout, className: 'Btn shadow-sm' }, [
                            e('div', { className: 'sign' }, e(Icon, { n: 'log-out', size: 14, cls: 'text-white' })),
                            e('div', { className: 'text' }, 'Logout')
                        ])
                    ),
                    e('div', { className: 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-6 mb-6 md:mb-16' },
                        [
                            { l: 'Admin', v: '12 Active', i: 'user-plus', c: 'bg-blue-500/20 text-blue-400 border border-blue-500/30' },
                            { l: 'Staff', v: '45 Faculty', i: 'users', c: 'bg-purple-500/20 text-purple-400 border border-purple-500/30' },
                            { l: 'Fees', v: 'Manage Accounts', i: 'banknote', c: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' },
                            { l: 'Data', v: 'Sync DB', i: 'file-text', c: 'bg-amber-500/20 text-amber-400 border border-amber-500/30' },
                            { l: 'Admissions', v: `${admissionsCount} Records`, i: 'graduation-cap', c: 'bg-sky-500/20 text-sky-400 border border-sky-500/30' }
                        ].map(s => e('div', { 
                            key: s.l, 
                            onClick: () => setActiveTab(s.l),
                            className: `clay-card p-4 md:p-6 rounded-2xl shadow-sm cursor-pointer transition-all duration-300 hover:scale-105 ${activeTab === s.l ? 'ring-2 ring-sky-500 border-sky-550' : 'border-slate-800'}` 
                        },
                            e('div', { className: `w-8 h-8 md:w-10 md:h-10 ${s.c} rounded-lg md:rounded-xl flex items-center justify-center mb-2 md:mb-4` }, e(Icon, { n: s.i, size: 16 })),
                            e('p', { className: 'text-[7px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5 md:mb-1' }, s.l),
                            e('p', { className: 'text-xs md:text-sm font-black text-slate-200 leading-none' }, s.v)
                        ))
                    ),
                    
                    e('div', { className: 'mb-12' },
                        activeTab === 'Admin' && e(AdminSessionManager),
                        activeTab === 'Data' && e(StudentDatabaseManager),
                        activeTab === 'Staff' && e(StaffManager),
                        activeTab === 'Fees' && e(FeeManager),
                        activeTab === 'Admissions' && e(AdmissionManager)
                    ),

                    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12 border-t border-slate-800 pt-12' },
                        e('div', null,
                            e('h3', { className: 'text-lg md:text-xl font-black mb-4 md:mb-6 flex items-center gap-2 text-slate-100' }, [e(Icon, { n: 'megaphone', size: 18, cls: 'text-sky-400' }), 'Post Notice']),
                            e('div', { className: 'clay-card p-5 md:p-8 rounded-2xl border border-slate-800 mb-6' }, e(NoticePublisher))
                        ),
                        e('div', null,
                            e('h3', { className: 'text-lg md:text-xl font-black mb-4 md:mb-6 flex items-center gap-2 text-slate-100' }, [e(Icon, { n: 'list', size: 18, cls: 'text-sky-400' }), 'Notices']),
                            e(NoticeList)
                        )
                    )
                )
            );
        };

        // Cleanup bloated legacy data URLs to prevent QuotaExceededError
        try {
            const rawDb = localStorage.getItem('bdms_admissions_db');
            if (rawDb) {
                const db = JSON.parse(rawDb);
                let migrated = false;
                const cleaned = db.map(adm => {
                    let recordMigrated = false;
                    const cleanDocs = { ...adm.docs };
                    if (cleanDocs.birthCert && cleanDocs.birthCert.data && cleanDocs.birthCert.data.length > 2000000) {
                        cleanDocs.birthCert = { ...cleanDocs.birthCert, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.parentID && cleanDocs.parentID.data && cleanDocs.parentID.data.length > 2000000) {
                        cleanDocs.parentID = { ...cleanDocs.parentID, data: '' };
                        recordMigrated = true;
                    }
                    if (cleanDocs.studentPhoto && cleanDocs.studentPhoto.data && cleanDocs.studentPhoto.data.length > 2000000) {
                        cleanDocs.studentPhoto = { ...cleanDocs.studentPhoto, data: '' };
                        recordMigrated = true;
                    }
                    if (recordMigrated) migrated = true;
                    return { ...adm, docs: cleanDocs };
                });
                if (migrated) {
                    localStorage.setItem('bdms_admissions_db', JSON.stringify(cleaned));
                    console.log('Sanitized local admissions database: cleared heavy file uploads.');
                }
            }
        } catch (e) {
            console.error('Failed to run admissions database migration:', e);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(e(DepartmentPortal));
    </script>
</body>
</html>
